  <style>
    :root {
      --delay: 0;
      --duration: 800ms;
      --iterations: 1;
    }


    .reveal-text,
    .reveal-text::after {
      animation-delay: var(--animation-delay, 2s);
      animation-iteration-count: var(--iterations, 1);
      animation-duration: var(--duration, 800ms);
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(0.0, 0.0, 0.2, 1);
    }

    .reveal-text {
      --animation-delay: var(--delay, 0);
      --animation-duration: var(--duration, 800ms);
      --animation-iterations: var(--iterations, 1);
      position: center;
      font-size: 10vw;
      animation-name: clip-text;
      color: #23617a;
      white-space: nowrap;
      font-weight: 600;
      cursor: default;

      &::after {
        content: "";
        position: absolute;
        z-index: 999;
        top: 0;
        left: 0px;
        right: 0px;
        bottom: 0;
        justify-content: center;
        background-color: #212c38;
        background-image: url("images/aqualogo.png");
        transform: scaleX(0);
        transform-origin: 0 90%;
        pointer-events: none;
        animation-name: text-revealer;
      }

    }


    @keyframes clip-text {
      from {
        clip-path: inset(0 100% 0 0);
      }

      to {
        clip-path: inset(0 0 0 0);
      }
    }

    @keyframes text-revealer {

      0%,
      50% {
        transform-origin: 0 70%;
      }

      60%,
      100% {
        transform-origin: 100% 50%;
      }

      60% {
        transform: scaleX(1);
      }

      100% {
        transform: scaleX(0);
      }
    }


    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background-color: white;
      margin: 5% auto;
      padding: 5px;
      border: 1px solid #0f0d12;
      width: 60%;
      text-align: Centert;
    }

    .close {
      color: #6b1212;
      float: right;
      font-size: 28px;
      font-weight: bold;
    }

    .close:hover,
    .close:focus {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }

    button {

      color: rgb(15, 15, 15);
      border: none;
      border-radius: 5px;

    }

    button:hover {

    }

    input {
      padding: 10px;
      font-size: 16px;
      color: #0f0d12;
      width: 70%;
      margin: 10px;
    }
  </style>

    <script>
      function findLinks() {
        const links = document.querySelectorAll("a");
        const modalList = document.getElementById("modal-links-list");
        modalList.innerHTML = "";

        if (links.length > 0) {
          links.forEach(link => {
            if (link.getAttribute("href") !== "#") {
              const modalListItem = document.createElement("li");
              modalListItem.textContent = link.textContent || link.href.split('/').pop();
              modalListItem.dataset.href = link.href;
              modalListItem.onclick = () => window.open(link.href, '_blank');
              modalList.appendChild(modalListItem);
            }
          });
        } else {
          modalList.innerHTML = "<li>No links found.</li>";
        }
      }

      function filterLinks() {
        const searchValue = document.getElementById("modal-search-box").value.toLowerCase();
        const listItems = document.querySelectorAll("#modal-links-list li");
        listItems.forEach(item => {
          item.style.display = item.textContent.toLowerCase().includes(searchValue) ? "" : "none";
        });
      }

      function openSearchModal() {
        findLinks();
        document.getElementById("searchModal").style.display = "flex";
      }

      function closeSearchModal() {
        document.getElementById("searchModal").style.display = "none";
      }
    </script>

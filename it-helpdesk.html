<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Helpdesk Request — Aqua-Aerobic Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --aqua-blue: #005f9e;
      --aqua-dark: #003f66;
      --aqua-mid: #0077bb;
      --aqua-light: #e4f2fb;
      --aqua-xlight: #f0f8ff;
      --accent: #00b4d8;
      --accent-warm: #f0a500;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --text: #0f2235;
      --radius: 10px;
      --shadow-sm: 0 1px 3px rgba(0, 63, 102, 0.08), 0 1px 2px rgba(0, 63, 102, 0.04);
      --shadow: 0 4px 16px rgba(0, 63, 102, 0.10), 0 1px 4px rgba(0, 63, 102, 0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--text); line-height: 1.6; min-height: 100vh; }
    .site-header { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 32px; box-shadow: var(--shadow-sm); position: sticky; top: 0; }
    .site-header::before { content: ''; display: block; height: 3px; background: linear-gradient(90deg, var(--aqua-dark) 0%, var(--aqua-mid) 60%, var(--accent) 100%); margin: 0 -32px; }
    .header-inner { max-width: 1360px; margin: 0 auto; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; padding: 12px 0; }
    .header-inner > a { justify-self: start; }
    .brand-logo { display: block; max-width: 280px; width: 100%; height: auto; }
    .header-text { text-align: center; justify-self: center; min-width: 0; }
    .site-header h1 { margin: 0 0 1px 0; font-size: 17px; font-weight: 700; color: var(--aqua-dark); font-family: 'DM Serif Display', serif; }
    .site-header p.sub { margin: 0; font-size: 12px; color: var(--gray-400); }
    .page-body { max-width: 700px; margin: 40px auto; padding: 40px; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); }
    .page-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--aqua-dark); margin-bottom: 8px; }
    .page-desc { font-size: 14px; color: var(--gray-600); margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--gray-200); }
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 15px; font-weight: 700; color: var(--aqua-dark); margin-bottom: 8px; }
    .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-control:focus { border-color: var(--aqua-blue); outline: none; box-shadow: 0 0 0 3px rgba(0, 95, 158, 0.12); }
    textarea.form-control { min-height: 120px; resize: vertical; }
    .urgency-options { display: flex; flex-direction: column; gap: 12px; }
    .urgency-option { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border: 2px solid var(--gray-200); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .urgency-option:hover { background: var(--gray-50); border-color: var(--gray-400); transform: translateY(-1px); }
    .urgency-option input { display: none; }
    .urgency-option.selected { border-color: var(--aqua-blue); background: var(--aqua-xlight); box-shadow: 0 4px 12px rgba(0, 95, 158, 0.08); }
    .urgency-icon { font-size: 22px; flex-shrink: 0; }
    .urgency-text { font-size: 15px; font-weight: 600; color: var(--text); }
    .urgency-desc { font-size: 13px; color: var(--gray-400); margin-left: auto; }
    .submit-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px; background: linear-gradient(135deg, var(--aqua-blue) 0%, var(--aqua-mid) 100%); color: var(--white); border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(0, 95, 158, 0.25); transition: transform 0.15s, box-shadow 0.15s; margin-top: 10px; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0, 95, 158, 0.35); }
    .submit-btn:active { transform: translateY(0); }
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13.5px; color: var(--aqua-mid); text-decoration: none; font-weight: 600; margin-bottom: 24px; transition: color 0.15s; }
    .back-link:hover { color: var(--aqua-dark); }
    .back-link svg { transition: transform 0.15s; }
    .back-link:hover svg { transform: translateX(-3px); }
    @media (max-width: 600px) {
      .header-inner { grid-template-columns: 1fr; text-align: center; gap: 10px; }
      .brand-logo { margin: 0 auto; }
      .page-body { margin: 20px 16px; padding: 24px; }
      .urgency-desc { display: none; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="indexdev.html" title="Employee Hub">
        <img class="brand-logo" src="http://www.aqua-aerobic.net/images/newlogo.png" alt="Aqua-Aerobic Systems, Inc." onerror="this.src='http://www.aqua-aerobic.net:3000/logo.jpg'">
      </a>
      <div class="header-text">
        <h1>IT Helpdesk</h1>
        <p class="sub">Support Request Form</p>
      </div>
      <div></div>
    </div>
  </header>

  <div class="page-body">
    <a href="indexdev.html" class="back-link">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7"/></svg>
      Back to Employee Hub
    </a>
    
    <h2 class="page-title">Submit a Ticket</h2>
    <p class="page-desc">Fill out the details below to generate an IT support request. This will format the information and open your default email client so you can easily hit send.</p>

    <div class="form-group">
      <label class="form-label" for="issue">1) What is the issue?</label>
      <textarea id="issue" class="form-control" placeholder="Describe the problem you are experiencing..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">2) How Urgent is this?</label>
      <div class="urgency-options" id="urgency-group">
        <label class="urgency-option selected">
          <input type="radio" name="urgency" value="1" checked onchange="updateUrgencyUI()">
          <span class="urgency-icon">🟩</span>
          <span class="urgency-text">Level 1 — Low</span>
          <span class="urgency-desc">(No rush)</span>
        </label>
        <label class="urgency-option">
          <input type="radio" name="urgency" value="3" onchange="updateUrgencyUI()">
          <span class="urgency-icon">🟨</span>
          <span class="urgency-text">Level 3 — Medium</span>
          <span class="urgency-desc">(Can wait a bit)</span>
        </label>
        <label class="urgency-option">
          <input type="radio" name="urgency" value="5" onchange="updateUrgencyUI()">
          <span class="urgency-icon">🟥</span>
          <span class="urgency-text">Level 5 — High</span>
          <span class="urgency-desc">(ASAP)</span>
        </label>
      </div>
    </div>

    <div class="form-group" style="margin-bottom: 32px;">
      <label class="form-label" for="contact">3) Best way to contact you?</label>
      <input type="text" id="contact" class="form-control" placeholder="e.g. Webex, Phone extension, Cell...">
    </div>

    <button class="submit-btn" onclick="submitTicket()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      Send email with email client
    </button>
  </div>

  <script>
    function updateUrgencyUI() {
      document.querySelectorAll('.urgency-option').forEach(el => el.classList.remove('selected'));
      const checked = document.querySelector('input[name="urgency"]:checked');
      if (checked) {
        checked.closest('.urgency-option').classList.add('selected');
      }
    }

    function submitTicket() {
      const issue = document.getElementById('issue').value.trim() || "(No issue described)";
      const contact = document.getElementById('contact').value.trim() || "(No contact method provided)";
      const urgencyVal = document.querySelector('input[name="urgency"]:checked').value;
      
      let urgencyText = "";
      if(urgencyVal === "1") urgencyText = "[ ] 1 - Low (No rush)";
      if(urgencyVal === "3") urgencyText = "[ ] 3 - Medium (Can wait a bit)";
      if(urgencyVal === "5") urgencyText = "[ ] 5 - High (ASAP)";

      const body = `1) What is the issue?\n${issue}\n\n2) How Urgent is this?\n${urgencyText}\n\n3) Best way to contact you?\n${contact}`;
      
      const encodedBody = encodeURIComponent(body);
      const mailtoLink = `mailto:ITHelpDesk@aqua-aerobic.com?subject=IT%20Request&body=${encodedBody}`;
      
      window.location.href = mailtoLink;
    }
  </script>
</body>
</html>

    /* Modal styles */
    .modal {
      display: none;
      padding-left: 50px;
      /* Hidden by default */
      position: fixed;
      z-index: 1;
      /* Sit on top */
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      /* Background color */
    }

    /* Modal content styles */
    .modal-content {
      position: relative;
      background-color: white;
      padding: 40px;
      width: 70%;
      margin: auto;
      top: 50%;
      transform: translateY(-50%);
      max-height: 80%;
      overflow-y: auto;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
    }

    /* Close button styles */
    .close-btn {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 30px;
      color: #aaa;
      cursor: pointer;
    }

    /* Image container */
    .modal-image-container {
      width: 60%;
      height: 400px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Image inside the container */
    .modal-image {
      width: 100%;
      padding: 40px;
      height: 100%;
      object-fit: cover;
      transition: transform 1s ease-in-out;
      /* Smooth transition for image sliding */
    }

    /* Navigation buttons */
    .nav-btn {
      position: absolute;
      top: 50%;
      background-color: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 30px;
      border: none;
      padding: 10px;
      cursor: pointer;
      transform: translateY(-50%);
    }

    #prevBtn {
      left: 10px;
    }

    #nextBtn {
      right: 10px;
    }

    /* Modal details */
    .modal-details {
      width: 35%;
      opacity: 0;
      transform: translateX(100%);
      /* Starts off the screen on the right */
      animation: slideInRight 1s forwards;
      /* Animate from right to left */
    }

    /* Title and description styles */
    .modal-details h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .modal-details p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .modal-details a {
      font-size: 16px;
      color: #007BFF;
      text-decoration: none;
    }

    .modal-details a:hover {
      text-decoration: underline;
    }

    /* Animations */
    @keyframes slideInRight {
      0% {
        opacity: 0;
        transform: translateX(100%);
      }

      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>

    <script>
      (function () {
        const modal = document.getElementById('formModal');
        const frame = document.getElementById('formModalFrame');
        const openLink = document.getElementById('openFormModal');
        const closeBtn = document.getElementById('closeFormModal');

        function openModal() {
          if (!modal || !frame) return;
          frame.src = 'Form.html';
          modal.style.display = 'block';
          modal.setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
          if (!modal) return;
          modal.style.display = 'none';
          modal.setAttribute('aria-hidden', 'true');
        }

        if (openLink) {
          openLink.addEventListener('click', function (e) {
            e.preventDefault();
            openModal();
          });
        }

        if (closeBtn) {
          closeBtn.addEventListener('click', closeModal);
        }

        if (modal) {
          modal.addEventListener('click', function (e) {
            if (e.target === modal) closeModal();
          });
        }

        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && modal && modal.style.display === 'block') closeModal();
        });
      })();

      (function () {
        const modal = document.getElementById('reportModal');
        const frame = document.getElementById('reportModalFrame');
        const closeBtn = document.getElementById('closeReportModal');
        const openLinks = document.querySelectorAll('a.reportLink[data-report-url]');

        function openReportModal(url) {
          if (!modal || !frame) return;
          frame.src = url;
          modal.style.display = 'block';
          modal.setAttribute('aria-hidden', 'false');
        }

        function closeReportModal() {
          if (!modal || !frame) return;
          modal.style.display = 'none';
          modal.setAttribute('aria-hidden', 'true');
          frame.src = '';
        }

        openLinks.forEach(function (link) {
          link.addEventListener('click', function (e) {
            e.preventDefault();
            openReportModal(link.getAttribute('data-report-url'));
          });
        });

        if (closeBtn) closeBtn.addEventListener('click', closeReportModal);

        if (modal) {
          modal.addEventListener('click', function (e) {
            if (e.target === modal) closeReportModal();
          });
        }

        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && modal && modal.style.display === 'block') closeReportModal();
        });
      })();
    </script>

    <script>
      function searchBody() {
        let input = document.getElementById('search').value.toLowerCase();
        let items = document.getElementsByTagName('div');

        for (let i = 0; i < items.length; i++) {
          let itemText = items[i].textContent.toLowerCase();
          if (itemText.includes(input)) {
            items[i].style.display = "block";
          } else {
            items[i].style.display = "none";
          }
        }
      }
    </script>

  <style>
    :root {
      --delay: 0;
      --duration: 800ms;
      --iterations: 1;
    }

    /* 窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ窶｢ﾂｷ */


    .reveal-text,
    .reveal-text::after {
      animation-delay: var(--animation-delay, 2s);
      animation-iteration-count: var(--iterations, 1);
      animation-duration: var(--duration, 800ms);
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(0.0, 0.0, 0.2, 1);
    }

    .reveal-text {
      --animation-delay: var(--delay, 0);
      --animation-duration: var(--duration, 800ms);
      --animation-iterations: var(--iterations, 1);
      position: center;
      font-size: 10vw;
      animation-name: clip-text;
      color: #23617a;
      white-space: nowrap;
      font-weight: 600;
      cursor: default;

      &::after {
        content: "";
        position: absolute;
        z-index: 999;
        top: 0;
        left: 0px;
        right: 0px;
        bottom: 0;
        justify-content: center;
        background-color: #212c38;
        background-image: url("images/aqualogo.png");
        transform: scaleX(0);
        transform-origin: 0 90%;
        pointer-events: none;
        animation-name: text-revealer;
      }

    }


    @keyframes clip-text {
      from {
        clip-path: inset(0 100% 0 0);
      }

      to {
        clip-path: inset(0 0 0 0);
      }
    }


    @keyframes text-revealer {

      0%,
      50% {
        transform-origin: 0 70%;
      }

      60%,
      100% {
        transform-origin: 100% 50%;
      }


      60% {
        transform: scaleX(1);
      }

      100% {
        transform: scaleX(0);
      }
    }
  </style>

</head>
